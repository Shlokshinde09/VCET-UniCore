<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Student Result (NEP)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-body">

    <div class="background-glow"></div>

    <main class="dashboard-body" style="max-width: 800px; margin: auto; padding-top: 5rem;">
        
        <div class="card form-card">
            <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Upload Student Result (NEP Structure)</h2>
                <a href="admin-dashboard.html" class="btn-outline" style="text-decoration:none;">Back to Admin</a>
            </div>

            <p style="color:var(--text-muted); margin-bottom:1.5rem; font-size:0.9rem;">
                Automation Active: The system will automatically compute Total Marks, Grade, Credit Points, SGPA, CGPA, and Percentages upon submission.
            </p>

            <form id="nepResultForm" class="admin-form">
                
                <div class="form-row">
                    <div class="form-group" style="flex:0.5;">
                        <label>Student ID</label>
                        <input type="number" id="nepStudentId" required>
                    </div>
                    <div class="form-group">
                        <label>Semester</label>
                        <input type="number" id="nepSemester" min="1" max="8" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label>Course Code</label>
                        <input type="text" id="nepCourseCode" placeholder="e.g. 2343111(TH)" required>
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>Course Name</label>
                        <input type="text" id="nepCourseName" placeholder="e.g. APPLIED MATHEMATICS THINKING - I" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Internal Marks (Max 40/50)</label>
                        <input type="number" step="0.5" id="nepInternal" required>
                    </div>
                    <div class="form-group">
                        <label>External Marks (Max 60)</label>
                        <input type="number" step="0.5" id="nepExternal" required>
                    </div>
                    <div class="form-group">
                        <label>Credits</label>
                        <input type="number" id="nepCredits" min="1" max="10" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width:100%; margin-top:1rem;">Submit & Calculate Grades</button>
            </form>
        </div>
        
    </main>

    <script src="result-calculation.js"></script>
</body>
</html>
