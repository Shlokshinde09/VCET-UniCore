<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Student Academic Analytics & Placement Guidance Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <img src="College_Logo_R-removebg-preview.png" alt="VCET Logo" class="college-logo">
            </div>

            <div class="card-header">
                <h1>Student Academic Analytics Portal</h1>
                <p>AI Powered Academic Insights & Placement Guidance</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="role">Select Role</label>
                    <select id="role" name="role" required>
                        <option value="student">Student</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required />
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Login</button>
                    <button type="button" class="btn-secondary" onclick="forgotPassword()">Forgot Password?</button>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
            </form>
        </div>
        
        <footer class="login-footer">
            <p>&copy; Vidyardhini's College of Engineering and Technology</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
